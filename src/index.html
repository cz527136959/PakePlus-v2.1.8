<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻翻乐网格·图片无默认·弹窗字独立编辑</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        .app {
            width: 900px;
            height: 700px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #d0d9e2;
        }
        /* 中部网格 */
        .grid-container {
            flex: 1;
            background: #f5f7fa;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            scrollbar-width: thin;
            scrollbar-color: #b0c4de #e2e8f0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            width: 100%;
            height: fit-content;
        }
        .card {
            aspect-ratio: 1 / 1;
            background: #2c4053;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 3px solid transparent;
            overflow: hidden;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 12px;
            pointer-events: none;
        }
        .card span {
            font-size: 2.2rem;
            line-height: 1;
            color: white;
            text-shadow: 2px 2px 2px #00000060;
            font-weight: bold;
        }
        .card.clicked {
            opacity: 0.9;
            filter: brightness(1.1);
            border-color: #4caf92;
        }

        /* 顶部自定义编辑区 - 新布局两行 */
        .custom-edit-panel {
            background: #ffffff;
            padding: 12px 16px;
            border-top: 2px solid #dde3e9;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: #1e2a36;
        }
        .row-top {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        /* 编辑模式复选框 */
        .edit-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f4f8;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #ccd7e4;
        }
        .edit-toggle label {
            color: #1e3b5c;
        }
        .edit-toggle input {
            width: 16px;
            height: 16px;
            margin: 0;
        }
        /* 数量设置 */
        .count-area {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f4f8;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #ccd7e4;
        }
        .count-area span {
            color: #1e3b5c;
        }
        .count-area input {
            background: #ffffff;
            border: 1px solid #b0c8dd;
            color: #1e2a36;
            padding: 4px 8px;
            border-radius: 30px;
            width: 60px;
            text-align: center;
        }
        .count-area button {
            background: #ffffff;
            border: 1px solid #2c5f8a;
            color: #1e3b5c;
            padding: 4px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .count-area button:hover {
            background: #e1effa;
        }
        /* 图片字段公共样式 */
        .image-field {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f4f8;
            padding: 5px 10px;
            border-radius: 40px;
            flex-wrap: wrap;
            border: 1px solid #ccd7e4;
        }
        .image-preview {
            width: 36px;
            height: 36px;
            background: #e6edf5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 1px solid #a0b8d0;
            overflow: hidden;
            color: #2c3e50;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview span {
            font-size: 1.6rem;
            line-height: 1;
            color: #2c3e50;
        }
        .field-actions {
            display: flex;
            gap: 4px;
        }
        .field-actions button {
            background: #ffffff;
            border: 1px solid #b0c8dd;
            color: #1e3b5c;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.1s;
        }
        .field-actions button:hover {
            background: #e1effa;
        }
        /* 第二行布局 */
        .row-bottom {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        /* 弹窗字编辑按钮 */
        .edit-text-btn {
            background: #ffffff;
            border: 1px solid #2c5f8a;
            color: #1e3b5c;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .edit-text-btn:hover {
            background: #e6f0fa;
        }
        #selectedHint {
            color: #b85c1a;
            margin-left: auto;
            font-weight: 500;
        }

        /* 底部功能栏 */
        .bottom-actions {
            background: #ffffff;
            padding: 10px 16px;
            border-top: 2px solid #dde3e9;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px 20px;
        }
        .bottom-actions button, .bottom-actions select {
            background: #ffffff;
            border: 1px solid #b0c8dd;
            color: #1e3b5c;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .bottom-actions button:hover {
            background: #e1effa;
        }
        .bottom-actions select {
            width: 140px;
            background: #ffffff;
        }

        /* 弹窗 (主弹窗) */
        .popup-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .popup-content {
            width: 520px;
            background: #ffffff;
            border-radius: 40px;
            padding: 24px;
            display: flex;
            gap: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            border: 2px solid #9bb7d4;
            color: #1e2a36;
        }
        .popup-left {
            flex: 0 0 100px;
            height: 100px;
            background: #eef4fa;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 2px solid #7fa1c2;
            overflow: hidden;
            color: #2c3e50;
        }
        .popup-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .popup-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f7ff;
            padding: 16px;
            border-radius: 28px;
            font-size: 1rem;
            line-height: 1.5;
            border: 1px solid #9bb7d4;
            color: #1e3b5c;
            word-break: break-word;
            overflow-wrap: break-word;
            min-height: 100px;
            text-align: center;
        }
        .close-popup {
            position: absolute;
            top: 20px; right: 30px;
            background: #d32f2f;
            color: white;
            border: none;
            font-size: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
        }
        .close-popup:hover {
            background: #b71c1c;
        }

        /* 弹窗字编辑弹窗 */
        .text-edit-dialog {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
        }
        .text-edit-box {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 3px solid #6d8eb0;
        }
        .text-edit-box h3 {
            color: #1e3b5c;
            margin: 0;
        }
        .text-edit-box input {
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid #b0c8dd;
            background: #f5f9ff;
            color: #1e2a36;
            font-size: 1rem;
            width: 300px;
        }
        .text-edit-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .text-edit-actions button {
            padding: 10px 30px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-save {
            background: #4e8ab0;
            color: white;
        }
        .btn-cancel {
            background: #ccc;
            color: #1e2a36;
        }

        /* 二次确认弹窗白底 */
        .confirm-dialog {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .confirm-box {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 60px;
            text-align: center;
            border: 3px solid #bc8c5c;
            color: #1e2a36;
        }
        .confirm-box h3 {
            color: #2c3e50;
        }
        .confirm-box p {
            color: #2c3e50;
        }
        .confirm-box button {
            margin: 10px 15px;
            padding: 10px 30px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-yes { background: #a54242; color: white; }
        .btn-no { background: #3d6b8c; color: white; }

        /* 模板命名弹窗白底 */
        .template-dialog {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2100;
        }
        .template-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 3px solid #6d8eb0;
        }
        .template-box h3 {
            color: #1e3b5c;
            margin: 0;
        }
        .template-box input {
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid #b0c8dd;
            background: #f5f9ff;
            color: #1e2a36;
            font-size: 1rem;
        }
        .template-actions button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            margin: 0 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden-upload {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 网格容器 -->
    <div class="grid-container" id="gridContainer">
        <div class="grid" id="grid"></div>
    </div>

    <!-- 顶部自定义编辑区 - 新布局两行 (无默认按钮) -->
    <div class="custom-edit-panel" id="editPanel">
        <!-- 第一行：编辑模式、数量设置、未点击图片 -->
        <div class="row-top">
            <div class="edit-toggle">
                <input type="checkbox" id="editModeCheckbox">
                <label for="editModeCheckbox">编辑模式</label>
            </div>
            <div class="count-area">
                <span>数量:</span>
                <input type="number" id="itemCount" min="1" max="200" value="10" step="1">
                <button id="applyCount">设置</button>
            </div>
            <!-- 未点击图片 (无默认按钮) -->
            <div class="image-field">
                <div class="image-preview" id="previewPre">🖼️</div>
                <span>未点</span>
                <div class="field-actions">
                    <button id="uploadPreBtn">📎上传</button>
                    <!-- 默认按钮已移除 -->
                </div>
            </div>
        </div>

        <!-- 第二行：弹窗图、已点图片、设置弹窗字按钮、选中提示 -->
        <div class="row-bottom">
            <!-- 弹窗图片 (无默认按钮) -->
            <div class="image-field">
                <div class="image-preview" id="previewPopImg">🌄</div>
                <span>弹窗图</span>
                <div class="field-actions">
                    <button id="uploadPopImgBtn">📎上传</button>
                    <!-- 默认按钮已移除 -->
                </div>
            </div>
            <!-- 点击后图片 - 文字改为"已点" (无默认按钮) -->
            <div class="image-field">
                <div class="image-preview" id="previewClicked">✨</div>
                <span>已点</span>
                <div class="field-actions">
                    <button id="uploadClickedBtn">📎上传</button>
                    <!-- 默认按钮已移除 -->
                </div>
            </div>
            <!-- 设置弹窗字按钮 (取代输入框和应用按钮) -->
            <button class="edit-text-btn" id="editTextBtn">✎设置弹窗字</button>
            <!-- 选中提示 -->
            <span id="selectedHint">未选中</span>
        </div>
    </div>

    <!-- 底部功能栏 -->
    <div class="bottom-actions">
        <button id="saveTemplateBtn">💾保存模板</button>
        <select id="templateSelect">
            <option value="">加载模板...</option>
        </select>
        <button id="randomBtn">🎲随机</button>
        <button id="resetPosBtn">↺初始化</button>
        <button id="resetAllBtn">⚠重置</button>
    </div>

    <!-- 隐藏的文件输入框 -->
    <input type="file" id="filePre" accept="image/*" class="hidden-upload">
    <input type="file" id="filePopImg" accept="image/*" class="hidden-upload">
    <input type="file" id="fileClicked" accept="image/*" class="hidden-upload">

    <!-- 主弹窗 (用于展示点击后效果) -->
    <div class="popup-modal" id="popupModal">
        <div class="popup-content">
            <div class="popup-left" id="popupLeft">🐱</div>
            <div class="popup-right" id="popupRight">默认文字</div>
        </div>
        <button class="close-popup" id="closePopupBtn">&times;</button>
    </div>

    <!-- 弹窗字编辑弹窗 -->
    <div class="text-edit-dialog" id="textEditDialog">
        <div class="text-edit-box">
            <h3>编辑弹窗文字</h3>
            <input type="text" id="textEditInput" placeholder="最多20字" maxlength="20">
            <div class="text-edit-actions">
                <button class="btn-save" id="textEditSave">保存</button>
                <button class="btn-cancel" id="textEditCancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 随机二次确认弹窗 -->
    <div class="confirm-dialog" id="randomConfirmDialog">
        <div class="confirm-box">
            <h3>🎲 随机打乱</h3>
            <p>确定要随机交换弹窗图/文字/点击后图吗？<br>所有格子将变为未点击状态。</p>
            <button class="btn-yes" id="randomConfirmYes">确定</button>
            <button class="btn-no" id="randomConfirmNo">取消</button>
        </div>
    </div>

    <!-- 全部重置二次确认弹窗 -->
    <div class="confirm-dialog" id="confirmResetDialog">
        <div class="confirm-box">
            <h3>⚠️ 全部重置</h3>
            <p>所有内容(数量/自定义)将恢复默认！</p>
            <button class="btn-yes" id="confirmResetYes">确定</button>
            <button class="btn-no" id="confirmResetNo">取消</button>
        </div>
    </div>

    <!-- 模板命名弹窗 -->
    <div class="template-dialog" id="templateNameDialog">
        <div class="template-box">
            <h3 style="color:#1e3b5c;">保存模板</h3>
            <input type="text" id="templateNameInput" placeholder="输入模板名称" autocomplete="off">
            <div class="template-actions">
                <button id="saveTemplateConfirm" style="background:#4e8ab0; color:white;">保存</button>
                <button id="saveTemplateCancel" style="background:#ccc; color:#1e2a36;">取消</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 核心数据结构 ----------
        let items = [];                // { pre, popImg, popText, clickedImg, clicked, originalIndex }
        let baseItems = [];            // 原始分配快照 (无clicked)

        const DEFAULT_PRE = '🖼️';
        const DEFAULT_POPIMG = '🌄';
        const DEFAULT_POPTEXT = '说明';
        const DEFAULT_CLICKEDIMG = '✨';

        let templates = JSON.parse(localStorage.getItem('FANFANLE_TEMPLATES')) || [];

        // DOM 元素
        const gridEl = document.getElementById('grid');
        const itemCountInput = document.getElementById('itemCount');
        const applyCountBtn = document.getElementById('applyCount');
        const editModeCheck = document.getElementById('editModeCheckbox');
        const randomBtn = document.getElementById('randomBtn');
        const resetPosBtn = document.getElementById('resetPosBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');
        const saveTemplateBtn = document.getElementById('saveTemplateBtn');
        const templateSelect = document.getElementById('templateSelect');
        const selectedHint = document.getElementById('selectedHint');
        const popupModal = document.getElementById('popupModal');
        const popupLeft = document.getElementById('popupLeft');
        const popupRight = document.getElementById('popupRight');
        const closePopupBtn = document.getElementById('closePopupBtn');
        const confirmResetDialog = document.getElementById('confirmResetDialog');
        const confirmResetYes = document.getElementById('confirmResetYes');
        const confirmResetNo = document.getElementById('confirmResetNo');
        const randomConfirmDialog = document.getElementById('randomConfirmDialog');
        const randomConfirmYes = document.getElementById('randomConfirmYes');
        const randomConfirmNo = document.getElementById('randomConfirmNo');
        const templateNameDialog = document.getElementById('templateNameDialog');
        const templateNameInput = document.getElementById('templateNameInput');
        const saveTemplateConfirm = document.getElementById('saveTemplateConfirm');
        const saveTemplateCancel = document.getElementById('saveTemplateCancel');

        // 新增加的弹窗字编辑相关
        const editTextBtn = document.getElementById('editTextBtn');
        const textEditDialog = document.getElementById('textEditDialog');
        const textEditInput = document.getElementById('textEditInput');
        const textEditSave = document.getElementById('textEditSave');
        const textEditCancel = document.getElementById('textEditCancel');

        // 预览元素
        const previewPre = document.getElementById('previewPre');
        const previewPopImg = document.getElementById('previewPopImg');
        const previewClicked = document.getElementById('previewClicked');

        // 文件上传
        const filePre = document.getElementById('filePre');
        const filePopImg = document.getElementById('filePopImg');
        const fileClicked = document.getElementById('fileClicked');
        const uploadPreBtn = document.getElementById('uploadPreBtn');
        const uploadPopImgBtn = document.getElementById('uploadPopImgBtn');
        const uploadClickedBtn = document.getElementById('uploadClickedBtn');

        let currentSelectedIndex = -1;
        let editMode = false;

        // ---------- 辅助函数 ----------
        function createDefaultItem(index) {
            return {
                pre: DEFAULT_PRE,
                popImg: DEFAULT_POPIMG,
                popText: DEFAULT_POPTEXT,
                clickedImg: DEFAULT_CLICKEDIMG,
                clicked: false,
                originalIndex: index
            };
        }

        function rebuildItems(count, useDefault = true, baseArray = null) {
            if (useDefault) {
                items = [];
                for (let i = 0; i < count; i++) items.push(createDefaultItem(i));
                baseItems = items.map(it => ({
                    pre: it.pre, popImg: it.popImg, popText: it.popText, clickedImg: it.clickedImg
                }));
            } else {
                items = [];
                for (let i = 0; i < count; i++) {
                    let base = baseArray[i] || { pre:DEFAULT_PRE, popImg:DEFAULT_POPIMG, popText:DEFAULT_POPTEXT, clickedImg:DEFAULT_CLICKEDIMG };
                    items.push({
                        pre: base.pre,
                        popImg: base.popImg,
                        popText: base.popText,
                        clickedImg: base.clickedImg,
                        clicked: false,
                        originalIndex: i
                    });
                }
                baseItems = items.map(it => ({ pre: it.pre, popImg: it.popImg, popText: it.popText, clickedImg: it.clickedImg }));
            }
            currentSelectedIndex = -1;
            clearSelectedHint();
            renderGrid();
            updateScrollable();
        }

        function updateScrollable() {
            document.getElementById('gridContainer').style.overflowY = items.length > 50 ? 'auto' : 'hidden';
        }

        function renderGrid() {
            let html = '';
            items.forEach((item, idx) => {
                const content = item.clicked ? item.clickedImg : item.pre;
                const clickedClass = item.clicked ? 'clicked' : '';
                let innerHtml = (typeof content === 'string' && content.startsWith('data:image/'))
                    ? `<img src="${content}" alt="img">` : `<span>${content}</span>`;
                html += `<div class="card ${clickedClass}" data-index="${idx}">${innerHtml}</div>`;
            });
            gridEl.innerHTML = html;
        }

        function setPreview(previewEl, value) {
            if (typeof value === 'string' && value.startsWith('data:image/')) {
                previewEl.innerHTML = `<img src="${value}" alt="preview">`;
            } else {
                previewEl.innerHTML = `<span>${value}</span>`;
            }
        }

        function clearSelectedHint() {
            selectedHint.innerText = '未选中';
            // 不重置预览，保持显示上次内容？但通常选中清除时预览可恢复默认？为了一致性，我们重置为默认。
            previewPre.innerHTML = '🖼️';
            previewPopImg.innerHTML = '🌄';
            previewClicked.innerHTML = '✨';
        }

        function loadItemToEdit(index) {
            if (!editMode || index < 0 || index >= items.length) return;
            const it = items[index];
            setPreview(previewPre, it.pre);
            setPreview(previewPopImg, it.popImg);
            setPreview(previewClicked, it.clickedImg);
            selectedHint.innerText = `编辑 #${index+1}`;
        }

        function showPopup(popImg, popText) {
            setPreview(popupLeft, popImg);
            popupRight.innerText = popText;
            popupModal.style.display = 'flex';
        }

        closePopupBtn.addEventListener('click', () => popupModal.style.display = 'none');

        // 网格点击
        gridEl.addEventListener('click', (e) => {
            const card = e.target.closest('.card');
            if (!card) return;
            const index = parseInt(card.dataset.index, 10);
            if (editMode) {
                currentSelectedIndex = index;
                loadItemToEdit(index);
                return;
            }
            if (!items[index].clicked) {
                items[index].clicked = true;
                showPopup(items[index].popImg, items[index].popText);
                renderGrid();
            }
        });

        // 数量设置
        applyCountBtn.addEventListener('click', () => {
            let newCount = parseInt(itemCountInput.value, 10) || 1;
            itemCountInput.value = newCount;
            rebuildItems(newCount, true);
        });

        // 编辑模式切换
        editModeCheck.addEventListener('change', (e) => {
            editMode = e.target.checked;
            if (!editMode) {
                currentSelectedIndex = -1;
                clearSelectedHint();
            } else {
                currentSelectedIndex = -1;
                clearSelectedHint();
            }
        });

        // 随机二次确认
        randomBtn.addEventListener('click', () => {
            randomConfirmDialog.style.display = 'flex';
        });
        randomConfirmYes.addEventListener('click', () => {
            randomConfirmDialog.style.display = 'none';
            if (items.length === 0) return;
            let popImgs = items.map(it => it.popImg);
            let popTexts = items.map(it => it.popText);
            let clickedImgs = items.map(it => it.clickedImg);
            let indices = Array.from({ length: items.length }, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            for (let i = 0; i < items.length; i++) {
                items[i].popImg = popImgs[indices[i]];
                items[i].popText = popTexts[indices[i]];
                items[i].clickedImg = clickedImgs[indices[i]];
                items[i].clicked = false;
            }
            renderGrid();
            if (editMode && currentSelectedIndex !== -1) loadItemToEdit(currentSelectedIndex);
        });
        randomConfirmNo.addEventListener('click', () => {
            randomConfirmDialog.style.display = 'none';
        });

        // 位置初始化
        resetPosBtn.addEventListener('click', () => {
            for (let i = 0; i < items.length; i++) {
                items[i].popImg = baseItems[i].popImg;
                items[i].popText = baseItems[i].popText;
                items[i].clickedImg = baseItems[i].clickedImg;
                items[i].clicked = false;
            }
            renderGrid();
            if (editMode && currentSelectedIndex !== -1) loadItemToEdit(currentSelectedIndex);
        });

        // 全部重置二次确认
        resetAllBtn.addEventListener('click', () => {
            confirmResetDialog.style.display = 'flex';
        });
        confirmResetYes.addEventListener('click', () => {
            itemCountInput.value = 10;
            rebuildItems(10, true);
            confirmResetDialog.style.display = 'none';
        });
        confirmResetNo.addEventListener('click', () => {
            confirmResetDialog.style.display = 'none';
        });

        // 弹窗字编辑按钮逻辑
        editTextBtn.addEventListener('click', () => {
            if (!editMode) {
                alert('请先进入编辑模式');
                return;
            }
            if (currentSelectedIndex === -1) {
                alert('请先选中一个格子');
                return;
            }
            // 弹出编辑框，预填当前文字
            textEditInput.value = items[currentSelectedIndex].popText;
            textEditDialog.style.display = 'flex';
        });

        textEditSave.addEventListener('click', () => {
            if (currentSelectedIndex === -1) {
                textEditDialog.style.display = 'none';
                return;
            }
            const newText = textEditInput.value.trim() || DEFAULT_POPTEXT;
            items[currentSelectedIndex].popText = newText;
            baseItems[currentSelectedIndex].popText = newText; // 同步到基础快照
            // 更新预览？没有直接预览文字，但选中提示不变
            // 重新渲染网格（因为文字不显示在格子上，但下次点击弹窗会显示新文字）
            // 不需要重新渲染，因为文字不影响格子外观
            textEditDialog.style.display = 'none';
        });

        textEditCancel.addEventListener('click', () => {
            textEditDialog.style.display = 'none';
        });

        // 图片上传逻辑 (无默认按钮)
        function handleUpload(button, fileInput, fieldName, previewEl) {
            button.addEventListener('click', () => {
                if (currentSelectedIndex === -1 || !editMode) {
                    alert('请先在编辑模式下选中一个格子');
                    return;
                }
                fileInput.click();
            });
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    const idx = currentSelectedIndex;
                    items[idx][fieldName] = dataUrl;
                    baseItems[idx][fieldName] = dataUrl;
                    setPreview(previewEl, dataUrl);
                    renderGrid();
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });
        }
        handleUpload(uploadPreBtn, filePre, 'pre', previewPre);
        handleUpload(uploadPopImgBtn, filePopImg, 'popImg', previewPopImg);
        handleUpload(uploadClickedBtn, fileClicked, 'clickedImg', previewClicked);

        // 模板保存
        saveTemplateBtn.addEventListener('click', () => {
            templateNameDialog.style.display = 'flex';
        });
        saveTemplateConfirm.addEventListener('click', () => {
            const name = templateNameInput.value.trim();
            if (!name) { alert('请输入模板名称'); return; }
            const count = items.length;
            const templateItems = baseItems.map(b => ({ ...b }));
            templates.push({ name, count, items: templateItems });
            localStorage.setItem('FANFANLE_TEMPLATES', JSON.stringify(templates));
            updateTemplateSelect();
            templateNameDialog.style.display = 'none';
            templateNameInput.value = '';
        });
        saveTemplateCancel.addEventListener('click', () => {
            templateNameDialog.style.display = 'none';
            templateNameInput.value = '';
        });

        templateSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (!val) return;
            const template = templates.find(t => t.name === val);
            if (template) {
                itemCountInput.value = template.count;
                rebuildItems(template.count, false, template.items);
            }
        });

        function updateTemplateSelect() {
            let options = '<option value="">加载模板...</option>';
            templates.forEach(t => options += `<option value="${t.name}">${t.name}</option>`);
            templateSelect.innerHTML = options;
        }

        window.addEventListener('click', (e) => {
            if (e.target === popupModal) popupModal.style.display = 'none';
            if (e.target === confirmResetDialog) confirmResetDialog.style.display = 'none';
            if (e.target === randomConfirmDialog) randomConfirmDialog.style.display = 'none';
            if (e.target === templateNameDialog) templateNameDialog.style.display = 'none';
            if (e.target === textEditDialog) textEditDialog.style.display = 'none';
        });

        // 初始化
        rebuildItems(10, true);
        updateTemplateSelect();
    })();
</script>
</body>
</html>
